let req = new XMLHttpRequest();

req.onreadystatechange = () => {
  if (req.readyState == XMLHttpRequest.DONE) {
    const data = JSON.parse(req.responseText);
    y = data.record;
    y = y.reverse()
    function generateDates(startDateStr, n) {
    const [year, month, day] = startDateStr.split("-").map(Number);

    return Array.from({ length: n }, (_, i) => {
        const d = new Date(Date.UTC(year, month - 1, day + i));

        return [
            d.getUTCFullYear(),
            String(d.getUTCMonth() + 1).padStart(2, "0"),
            String(d.getUTCDate()).padStart(2, "0")
        ].join("-");
    });
}

const dates = generateDates("2025-12-16", y.length);

// ---- Milestones ----

function getMilestones(dates, y) {
    let prevFloor = Math.floor(y.find(v => v !== null));

    const mx = [];
    const my = [];
    const labels = [];

    for (let i = 0; i < y.length; i++) {
        const val = y[i];

        if (val !== null) {
            const currFloor = Math.floor(val);

            if (currFloor < prevFloor) {
                mx.push(dates[i]);
                my.push(val);
                labels.push(String(currFloor));
                prevFloor = currFloor;
            }
        }
    }

    return { mx, my, labels };
}

const { mx, my, labels } = getMilestones(dates, y);

// ---- Colors ----

const LINE_COLOR = "#C96A2B";
const BG_COLOR = "#F7F1E8";
const FRAME_COLOR = "#3B2F2F";
const TICK_COLOR = "#A89F94";

// ---- Traces ----
const hovertexts = dates.map((d, i) => `${d}<br>${y[i]}`);
const weightTrace = {
    x: dates,
    y: y,
    mode: "lines",
    connectgaps: true,

    line: {
        width: 2,
        color: LINE_COLOR
    },
    hoverinfo: "text",
    text: hovertexts,
    name: "体重"
    
};

const milestoneTrace = {
    x: mx,
    y: my,

    mode: "markers+text",

    text: labels,
    textposition: "bottom center",

    marker: {
        size: 6,
        color: "white",
        line: {
            width: 2,
            color: LINE_COLOR
        }
    },

    textfont: {
        size: 16,
        color: "darkgoldenrod"
    },

    hoverinfo: "skip",

    name: "里程碑"
};

// ---- Axis range ----

const yMax = Math.max(...y.filter(v => v !== null)) + 1;

const rangeSpan = yMax - yMin;
const dtick = Math.max(
    1,
    Math.round(rangeSpan / 8)
);

// ---- Layout ----
const startStr = dates[0];
const endStr = dates[dates.length - 1];

function formatCN(dateStr) {
    const [y, m, d] = dateStr.split("-");
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

const title =
    `总减重: ${(y[0] - y[y.length - 1]).toFixed(2)} kg (` +
    `${formatCN(startStr)} - ${formatCN(endStr)})`;

const layout = {

    title: title,
    paper_bgcolor: BG_COLOR,
    plot_bgcolor: BG_COLOR,
    showlegend: false,
    hovermode: "closest",
    spikedistance: -1,
    margin: {
        l: 60,
        r: 60,
        t: 60,
        b: 60
    },

    font: {
        family:
            "STKaiti, Songti SC, serif",
        size: 14,
        color: FRAME_COLOR
    },

    xaxis: {
        type: "date",
        range: [
            new Date(new Date(dates[0]).getTime() - 3 * 86400000),
            new Date(new Date(dates[dates.length - 1]).getTime() + 3 * 86400000)
        ],
        tickvals: mx,
        ticktext: mx.map(d => {
            const [y, m, day] = d.split("-");
            return `${parseInt(m)}月${parseInt(day)}日`;
        }),
        tickangle: -45,
        showline: true,
        linecolor: FRAME_COLOR,
        mirror: true,
        gridcolor: "rgba(0,0,0,0.05)",
        tickfont: { color: TICK_COLOR },
        showspikes: false
    },

    yaxis: {
        showspikes: false,
        range: [yMin - 1, yMax],

        tick0: yMin,
        dtick: dtick,

        showline: true,
        linecolor: FRAME_COLOR,

        mirror: true,

        gridcolor:
            "rgba(0,0,0,0.05)",

        tickfont: {
            color: TICK_COLOR
        }
    }
};

// ---- Render ----

Plotly.newPlot(
    "plot",
    [weightTrace, milestoneTrace],
    layout,
    {
        responsive: true
    }
);
  }
};

<script>
// --- your function that uses the number ---
function handleNumber(n) {
    // append n to y
    y.push(n);

    // reverse y (in-place)
    y.reverse();

    // convert to JSON string
    let json = JSON.stringify(y);

    let req = new XMLHttpRequest();
    req.onreadystatechange = () => {
    if (req.readyState == XMLHttpRequest.DONE) {
        console.log(req.responseText);
    }
    };

    req.open("PUT", "https://api.jsonbin.io/v3/b/6a31a1b9da38895dfecbc217", true);
    req.setRequestHeader("Content-Type", "application/json");
    req.setRequestHeader("X-Master-Key", "$2a$10$OBxmU7a6eu38e/WyoVdhRerNucod.s2WtPl2QPG3J2g5Hca4UZLtW");
    req.send(json);
}

// --- create popup UI once ---
const popup = document.createElement("div");
popup.style.position = "fixed";
popup.style.top = "0";
popup.style.left = "0";
popup.style.width = "100vw";
popup.style.height = "100vh";
popup.style.background = "rgba(0,0,0,0.5)";
popup.style.display = "none";
popup.style.alignItems = "center";
popup.style.justifyContent = "center";

popup.innerHTML = `
    <div style="background:white;padding:20px;border-radius:10px;">
        <input id="numInput" type="number" placeholder="Enter number" />
        <button id="submitBtn">Submit</button>
    </div>
`;

document.body.appendChild(popup);

const input = popup.querySelector("#numInput");
const btn = popup.querySelector("#submitBtn");

// --- show / hide helpers ---
function showPopup() {
    popup.style.display = "flex";
    input.value = "";
    input.focus();
}

function hidePopup() {
    popup.style.display = "none";
}

// --- submit logic ---
function submit() {
    const val = parseFloat(input.value);
    if (!isNaN(val)) {
        hidePopup();
        handleNumber(val);
    }
}

// --- event wiring ---
btn.onclick = submit;

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
});

// --- key listener for "q" ---
document.addEventListener("keydown", (e) => {
    // ignore if user is already typing in input
    if (document.activeElement === input) return;

    if (e.key === "q") {
        showPopup();
    }
});
</script>
